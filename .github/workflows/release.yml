name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.x"
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Extract version
        id: version
        shell: bash
        run: echo "tag=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          BINARY=scanforge
          if [ "$GOOS" = "windows" ]; then
            BINARY=scanforge.exe
          fi

          go build \
            -ldflags "-s -w -X github.com/MikeRoss27/scanforge/internal/version.Version=${VERSION} -X github.com/MikeRoss27/scanforge/internal/version.Commit=${GITHUB_SHA::7} -X github.com/MikeRoss27/scanforge/internal/version.Date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o "dist/${BINARY}" \
            ./cmd/scanforge

      - name: Package archive
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          mkdir -p release
          NAME="scanforge_${VERSION}_${GOOS}_${GOARCH}"

          if [ "$GOOS" = "windows" ]; then
            cp dist/scanforge.exe "release/${NAME}.exe"
            (cd release && sha256sum "${NAME}.exe" > "${NAME}.sha256")
            (cd release && zip "${NAME}.zip" "${NAME}.exe" "${NAME}.sha256")
          else
            cp dist/scanforge "release/${NAME}"
            chmod +x "release/${NAME}"
            (cd release && sha256sum "${NAME}" > "${NAME}.sha256")
            tar -czf "release/${NAME}.tar.gz" -C release "${NAME}" "${NAME}.sha256"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: scanforge-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/*

  publish:
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          mkdir -p dist
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" \) -exec cp {} dist/ \;
          (cd dist && sha256sum *.tar.gz *.zip 2>/dev/null > checksums.txt || true)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
